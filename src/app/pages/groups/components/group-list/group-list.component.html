<div class="main">
    <div class="content">

        <main>
            <section class="header">
                <span class="title">Groups</span>
                <div class="bttn-box">
                    <div class="searchGroup">
                        <input class="input-search" type="text" placeholder="Search..." [(ngModel)]="keyword"
                            (keyup.enter)="enterSearch()" (keyup)="searchMeeting()" />
                        <p>( Press enter for search )</p>

                    </div>
                    <button class="export" (click)="export()">
                        <span> Export </span>
                    </button>
                    <button class="add" (click)="onAddBtnClick()">
                        <span> Ceeate Group </span>
                    </button>
                </div>
            </section>

            <section class="container-box customScroll">

                <table class="table">
                    <!-- *ngIf="membersList.length > 0" -->
                    <thead class="thead">
                        <tr class="tr">
                            <th class="th">#</th>
                            <th class="th">Group Name</th>
                            <th class="th">Members count</th>
                            <th class="th">View</th>
                            <th class="th">Action</th>
                        </tr>
                    </thead>
                    <tbody class="tbody">
                        <tr class="tr" *ngFor="let group of grouplist;let i = index" [@listAnimation]>

                            <td class="td">{{i+ offset +1}}</td>
                            <td class="td">{{group.group_name}}</td>
                            <td class="td">{{group.member_count}}</td>
                            <td class="td" ><i class="fa-solid fa-eye" style="color: #404047;" (click)="viewGroup(group)"></i></td>
                            <td class="td">
                                <button class="actions" (click)="editGroup(group.id)">
                                    <i class="fa-solid fa-pen-to-square" style="color: #404047;"></i>
                                </button>
                                <button class="actions" (click)="wantTodeleteGroup(group.id)">
                                    <i class="fa-solid fa-trash-can" style="color: #404047;"></i>
                                </button>

                            </td>

                            <div class="deletepopup" *ngIf="(group.wantToDelete) && (group.wantToDelete == true)">
                                <p>Are you sure want to delete Group ?</p>
                                <div class="conformation">
                                    <button class="yesdelete" (click)="deleteGroup(group.id)">Yes</button>
                                    <button class="canceldelete" (click)="cancelDelete(group.id)">Cancel</button>
                                </div>
                            </div>

                        </tr>
                    </tbody>


                </table>

                <div class="flex pagi-wrap">
                    <div *ngIf="totalGroupsCount > 0">
                        <label class="label" for="search">Set Page Size:</label>
                        <select class="search select-drop" id="mysel" (change)="setPageSize($event)"
                            [(ngModel)]="limit">
                            <option selected value="5">5</option>
                            <option value="10">10</option>
                            <option value="15">15</option>
                            <option value="20">20</option>
                        </select>
                    </div>
                    <div *ngIf="totalGroupsCount > 5">
                        <ngb-pagination [(page)]="page" [rotate]="true" [maxSize]="5" [pageSize]="limit"
                            (pageChange)="pageEvent($event)" [collectionSize]="totalGroupsCount"></ngb-pagination>
                    </div>
                    <div *ngIf="totalGroupsCount > 5">
                        <label class="label" for="search">Go To Page:</label>
                        <input class="search" type="text" #search id="search" name="search"
                            (keyup.enter)="goToPage($event)" autocomplete="off" Decimalnumeric numericType="number">
                        <button class="btn gobutton" type="submit" name="go"
                            (click)="goToPage(search.value)">Go</button>
                    </div>
                </div>
            </section>
        </main>

        <div class="notification" *ngIf="(grouplist.length == 0) && !(groupsSandbox.groupsListLoading$ | async)">
            <i class="fa-solid fa-circle-exclamation fa-2xl" style="color: #404047;"></i>
            <p>No records found !</p>
        </div>

        <!-- LOADING DOTS... -->
        <div class="spinner box" *ngIf="(groupsSandbox.groupsListLoading$ | async)">
            <div class="pulse-container">
                <div class="pulse-bubble pulse-bubble-1"></div>
                <div class="pulse-bubble pulse-bubble-2"></div>
                <div class="pulse-bubble pulse-bubble-3"></div>
            </div>
        </div>

    </div>
</div>
