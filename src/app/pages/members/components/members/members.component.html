<div class="main">
  <div class="content">
    <!-- <div *ngIf="usersSandbox.userListLoading$ | async">
      <app-page-loader></app-page-loader>
    </div> -->
    <main>
      <section class="header">
        <span class="title">Members</span>
        <div class="bttn-box">
          <div class="searchmember">
            <input class="input-search" type="text" placeholder="Search..." [(ngModel)]="keyword"
            (keyup.enter)="enterSearch()"
            (keyup)="searchMember()"/>
            <p>( Press enter for search )</p>
            
          </div>
          <button class="export" (click)="export()">
            <!-- [ngClass]="(commonSandbox.exportListLoading$ | async) && 'block'" -->
            <!-- <i class="fa fa-spinner fa-spin"></i> -->
            <!-- *ngIf="commonSandbox.exportListLoading$ | async" -->
            <span> Export </span>
          </button>
          <button class="add" (click)="onAddBtnClick()">
            <span> Add Member </span>
          </button>
        </div>
      </section>

      <section class="container-box customScroll">
        
        <table class="table" *ngIf="membersList.length > 0">
          <thead class="thead">
            <tr class="tr">
              <th class="th">#</th>
              <th class="th">Member Name</th>
              <th class="th">City</th>
              <th class="th">Mobile</th>
              <th class="th">Role</th>
              <th class="th">Designation</th>
              <th class="th">Action</th>
            </tr>
          </thead>
          <tbody class="tbody" [@fadeInOut]>
            <tr class="tr" *ngFor="
            let member of membersList;
            let i = index" [@slideInOut]>

              <td class="td">{{i+ offset +1}}</td>
              <td class="td">{{member.name}}</td>
              <td class="td">{{member.city}}</td>
              <td class="td">{{member.mobile_number}}</td>
              <td class="td">
                <span
                [ngClass]=" member.type_id == 1 ? 'subAdmin' : 'staff'">
                  {{member.type_name}}
                </span>
              </td>

              <td class="td">{{member.designation}}</td>

              <td class="td">
                <button class="actions" (click)="editMember(member.id)">
                  <i class="fa-solid fa-pen-to-square" style="color: #404047;"></i>
                </button>
                <button class="actions" (click)="wantTodeleteMember(member.id)">
                  <i class="fa-solid fa-trash-can" style="color: #404047;"></i>
                </button>

              </td>

              <div class="deletepopup" *ngIf="(member.wantToDelete) && (member.wantToDelete == true)">
                <p>Are you sure want to delete member ?</p>
                <div class="conformation">
                  <button class="yesdelete" (click)="deleteMember(member.id)">Yes</button>
                  <button class="canceldelete" (click)="cancelDelete(member.id)">Cancel</button>
                </div>


              </div>
            </tr>
          </tbody>



        </table>

        <div class="flex pagi-wrap">
          <div *ngIf="totalMembersCount > 0">
            <label class="label" for="search">Set Page Size:</label>
            <select class="search select-drop" id="mysel" (change)="setPageSize($event)" [(ngModel)]="limit">
              <option selected value="5">5</option>
              <option value="10">10</option>
              <option value="15">15</option>
              <option value="20">20</option>
            </select>
          </div>
          <div *ngIf="totalMembersCount > 5">
            <ngb-pagination [(page)]="page" [rotate]="true" [maxSize]="5" [pageSize]="limit"
              (pageChange)="pageEvent($event)" [collectionSize]="totalMembersCount"></ngb-pagination>
          </div>
          <div *ngIf="totalMembersCount > 5">
            <label class="label" for="search">Go To Page:</label>
            <input class="search" type="text" #search id="search" name="search" (keyup.enter)="goToPage($event)"
              autocomplete="off" Decimalnumeric numericType="number">
            <button class="btn gobutton" type="submit" name="go" (click)="goToPage(search.value)">Go</button>
          </div>
        </div>
      </section>
    </main>

    <div class="notification" *ngIf="(membersList.length == 0) && !(membersSandbox.membersListLoading$ | async)">
      <i class="fa-solid fa-circle-exclamation fa-2xl" style="color: #404047;"></i>
      <p>No records found !</p>
    </div>

    <!-- LOADING DOTS... -->
    <div class="spinner box" *ngIf="(membersSandbox.membersListLoading$ | async)">
      <div class="pulse-container">
          <div class="pulse-bubble pulse-bubble-1"></div>
          <div class="pulse-bubble pulse-bubble-2"></div>
          <div class="pulse-bubble pulse-bubble-3"></div>
      </div>
  </div>

  </div>
</div>
